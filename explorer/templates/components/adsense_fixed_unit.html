{% load i18n %}
{% if settings.ADSENSE_CLIENT and slot %}
<div class="adsense-fixed-unit my-4 {% if extra_class %}{{ extra_class }}{% endif %}" {% if exclude_auto %}data-nosnippet data-ad-layout="-exclude"{% endif %}>
  {% trans "Publicidad" as ads_default_label %}
  <div class="adsense-fixed-label text-center mb-2">{{ label|default:ads_default_label }}</div>
  <ins class="adsbygoogle adsense-manual"
       id="ads-fixed-{{ placement|default:'block' }}-{{ slot }}-{{ unit_key|default:'u0' }}"
       style="display:block"
       data-ad-client="{{ settings.ADSENSE_CLIENT }}"
       data-ad-slot="{{ slot }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
    (function () {
      var unitId = "ads-fixed-{{ placement|default:'block' }}-{{ slot }}-{{ unit_key|default:'u0' }}";
      var unit = document.getElementById(unitId);
      if (!unit) return;
      try {
        (adsbygoogle = window.adsbygoogle || []).push({});
      } catch (e) {
        return;
      }
      setTimeout(function () {
        var status = unit.getAttribute("data-ad-status");
        if (status === "unfilled") {
          var wrapper = unit.closest(".adsense-fixed-unit");
          if (wrapper) wrapper.style.display = "none";
        }
      }, 1800);
    })();
  </script>
</div>
{% endif %}

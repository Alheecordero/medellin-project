{% if settings.ADSENSE_CLIENT and slot %}
<div class="adsense-fixed-unit my-4 {% if extra_class %}{{ extra_class }}{% endif %}" {% if exclude_auto %}data-nosnippet data-ad-layout="-exclude"{% endif %}>
  {% if label %}
    <div class="adsense-fixed-label text-center small text-white-50 mb-2">{{ label }}</div>
  {% endif %}
  <ins class="adsbygoogle"
       id="ads-fixed-{{ placement|default:'block' }}-{{ slot }}"
       style="display:block"
       data-ad-client="{{ settings.ADSENSE_CLIENT }}"
       data-ad-slot="{{ slot }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
    (function () {
      var unitId = "ads-fixed-{{ placement|default:'block' }}-{{ slot }}";
      var unit = document.getElementById(unitId);
      if (!unit) return;
      try {
        (adsbygoogle = window.adsbygoogle || []).push({});
      } catch (e) {
        return;
      }
      // Oculta contenedor si Google marca el bloque como no llenado.
      setTimeout(function () {
        var status = unit.getAttribute("data-ad-status");
        if (status === "unfilled") {
          var wrapper = unit.closest(".adsense-fixed-unit");
          if (wrapper) wrapper.style.display = "none";
        }
      }, 1800);
    })();
  </script>
</div>
{% endif %}

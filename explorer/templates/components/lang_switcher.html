{% load i18n %}
{% load form_tags %}
{% get_current_language as LANGUAGE_CODE %}

{# Componente de cambio de idioma reutilizable para el header global #}
<div class="site-lang-switcher" aria-label="{% trans 'Cambiar idioma' %}">
<form action="{% url 'set_language' %}" method="post" class="site-lang-switcher__form">
    {% csrf_token %}
    <input type="hidden" name="language" value="es">
    <input type="hidden" name="next" value="{% translate_url_to 'es' %}">
    <button type="submit" class="site-lang-switcher__btn {% if LANGUAGE_CODE == 'es' %}active{% endif %}" aria-label="{% trans 'Cambiar a español' %}{% if LANGUAGE_CODE == 'es' %} ({% trans 'idioma actual' %}){% endif %}">ES</button>
</form>
<form action="{% url 'set_language' %}" method="post" class="site-lang-switcher__form">
    {% csrf_token %}
    <input type="hidden" name="language" value="en">
    <input type="hidden" name="next" value="{% translate_url_to 'en' %}">
    <button type="submit" class="site-lang-switcher__btn {% if LANGUAGE_CODE|slice:':2' == 'en' %}active{% endif %}" aria-label="{% trans 'Cambiar a inglés' %}{% if LANGUAGE_CODE|slice:':2' == 'en' %} ({% trans 'idioma actual' %}){% endif %}">EN</button>
</form>
</div>

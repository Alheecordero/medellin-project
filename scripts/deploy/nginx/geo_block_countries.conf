# Bloqueo geográfico en origen (header CF-IPCountry de Cloudflare).
# No sustituye WAF en el edge, pero evita servir HTML/AdSense desde el VPS.
# Excepción: User-Agents de buscadores conocidos (Googlebot, Bingbot, …).

map $http_cf_ipcountry $geo_block_country {
    default 0;
    ""      0;

    CN 1;
    RU 1;
    KP 1;
    IR 1;
    BY 1;
    SY 1;
    CU 1;
    VE 1;
    PK 1;
    BD 1;
    NG 1;
    EG 1;
    ID 1;
    VN 1;
    PH 1;
    MM 1;
    KZ 1;
    UZ 1;
    TM 1;
    TJ 1;
    KG 1;
    AF 1;
    IQ 1;
    YE 1;
    LY 1;
    SD 1;
    SO 1;
    ET 1;
    ZW 1;
}

map $http_user_agent $geo_block_bot_ok {
    default 0;
    ~*googlebot               1;
    ~*bingbot                 1;
    ~*applebot                1;
    ~*duckduckbot             1;
    ~*facebookexternalhit     1;
    ~*twitterbot              1;
    ~*linkedinbot             1;
    ~*slackbot                1;
    ~*discordbot              1;
    ~*yandexbot               1;
    ~*baiduspider             1;
}

map "$geo_block_country:$geo_block_bot_ok" $geo_block_request {
    default 0;
    "1:0"   1;
}

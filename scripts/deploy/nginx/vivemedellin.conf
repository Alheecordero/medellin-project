# /etc/nginx/sites-available/vivemedellin
# Django/Gunicorn + rate limits + bloqueo geo (CF-IPCountry)
#
# Tras copiar: nginx -t && systemctl reload nginx

include /etc/nginx/vivemedellin-geo-block.conf;

limit_req_zone $binary_remote_addr zone=vm_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=vm_static:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=vm_api:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=vm_addr:10m;

server {
    listen 80;
    listen [::]:80;
    server_name vivemedellin.co www.vivemedellin.co;

    client_max_body_size 20m;
    limit_conn vm_addr 30;

    if ($geo_block_request) {
        return 403;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location /static/ {
        alias /var/www/medellin-project/staticfiles/;
        limit_req zone=vm_static burst=100 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/medellin-project/media/;
        limit_req zone=vm_static burst=50 nodelay;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~ ^/(api|es/api|en/api)/ {
        limit_req zone=vm_api burst=20 nodelay;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_pass http://unix:/run/gunicorn-vivemedellin.sock;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=vm_general burst=50 nodelay;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_pass http://unix:/run/gunicorn-vivemedellin.sock;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
